// ReGameDLL参数设置
// 汉化：毛毛的老公
// 日期：2026年5月25日

// 注意：在监听服务器中ZBots始终处于启用状态，不受控制台变量控制
//      服务器启动参数中无需增加"-bots"即可正常调用机器人
// 0 - 禁用
// 1 - 启用
//
// 默认: "0"
bot_enable "0"

// 启用CS.CZ中的人质AI优化功能
// 0 - 禁用 (经典的人质AI模式)
// 1 - 启用 (优化的人质AI模式)
//
// 默认: "0"
hostage_ai_enable "0"

// 设置玩家模型的碰撞体积边界
// 0 - 禁用 (使用引擎默认设置)
// 1 - 启用 (由ReGameDll设置)
//
// 默认: "1"
mp_hullbounds_sets "1"
